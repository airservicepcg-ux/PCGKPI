<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create Work Order</title>

<style>

body{
font-family:Arial;
background:#eef1f5;
margin:0;
}

.header{
background:#3f6aa8;
color:white;
text-align:center;
padding:18px;
font-size:20px;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

textarea{
height:80px;
}

button{
background:#3f6aa8;
color:white;
border:none;
padding:12px;
margin-top:15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
Create Work Order
</div>

<div class="container">

<label>Select Asset</label>
<select id="assetList" onchange="showAsset()"></select>

<label>Asset Name</label>
<input id="asset_name" readonly>

<label>Location</label>
<input id="location" readonly>

<label>Model</label>
<input id="model" readonly>

<label>Serial Number</label>
<input id="serial" readonly>

<label>Cooling BTU</label>
<input id="btu" readonly>

<label>Problem</label>
<textarea id="problem"></textarea>

<label>Priority</label>
<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

  <label>Owner</label>
<select id="owner">
<option value="">-- Select Owner --</option>
<option>MTN</option>
<option>ADC</option>
<option>FAD</option>
<option>CTC</option>
<option>PRD</option>
<option>QC</option>
<option>QA</option>
<option>WH</option>
<option>HSE</option>
<option>WHA</option>
</select>

<label>Owner Name</label>
<input id="owner_name">

<label>Email</label>
<input id="email">

<label>Phone</label>
<input id="phone">

</div>


<script>

let assetData = [];

function loadAssets(data){

assetData = data;

let dropdown = document.getElementById("assetList");

dropdown.innerHTML="";

data.forEach(a => {

let option = document.createElement("option");

option.value = a.assetID;
option.text = a.assetID;

dropdown.appendChild(option);

});

showAsset();

}

function showAsset(){

let id = document.getElementById("assetList").value;

let asset = assetData.find(a => a.assetID == id);

if(!asset) return;

document.getElementById("asset_name").value = asset.assetName;
document.getElementById("location").value = asset.location;
document.getElementById("model").value = asset.model;
document.getElementById("serial").value = asset.serial;
document.getElementById("btu").value = asset.btu;

}

</script>


<script src="https://script.google.com/macros/s/AKfycbwPXX3CoMZWwP_oVI_LZS1sO_1jKvgvLYfbzP501SuS-BP7pDhHs8TTdt9hhcMcDYBXng/exec?callback=loadAssets"></script>

</body>
</html>
