<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Work Order</title>

<style>

body{
font-family:Arial;
background:#eef1f5;
margin:0;
}

.header{
background:#3f6aa8;
color:white;
text-align:center;
padding:18px;
font-size:20px;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

select,input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

.info{
margin-top:10px;
padding:10px;
background:#f4f6fb;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
Create Work Order
</div>

<div class="container">

<label>Select Asset</label>

<select id="assetList" onchange="showAsset()">
<option>Loading...</option>
</select>

<div class="info">

<p><b>Asset Name:</b> <span id="asset_name"></span></p>
<p><b>Location:</b> <span id="location"></span></p>
<p><b>Manufacturer:</b> <span id="manufacturer"></span></p>
<p><b>Model:</b> <span id="model"></span></p>
<p><b>Serial:</b> <span id="serial"></span></p>
<p><b>Cooling BTU:</b> <span id="btu"></span></p>

</div>

</div>


<script>

let assetData = [];

function loadAssets(data){

assetData = data;

let dropdown = document.getElementById("assetList");

dropdown.innerHTML="";

data.forEach(a => {

let option = document.createElement("option");

option.value = a.assetID;
option.text = a.assetID;

dropdown.appendChild(option);

});

showAsset();

}


function showAsset(){

let id = document.getElementById("assetList").value;

let asset = assetData.find(a => a.assetID == id);

if(!asset) return;

document.getElementById("asset_name").innerText = asset.assetName;
document.getElementById("location").innerText = asset.location;
document.getElementById("manufacturer").innerText = asset.manufacturer;
document.getElementById("model").innerText = asset.model;
document.getElementById("serial").innerText = asset.serial;
document.getElementById("btu").innerText = asset.btu;

}

</script>


<script src="https://script.google.com/macros/s/AKfycbwPXX3CoMZWwP_oVI_LZS1sO_1jKvgvLYfbzP501SuS-BP7pDhHs8TTdt9hhcMcDYBXng/exec?callback=loadAssets"></script>

</body>
</html>
