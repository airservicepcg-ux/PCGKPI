<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Work Order</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#eef1f5;
margin:0;
}

.header{
background:#3a66a8;
color:white;
text-align:center;
padding:16px;
font-size:20px;
font-weight:bold;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

select,input,textarea{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
background:#3a66a8;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2e4f86;
}

.footer{
text-align:center;
margin-top:30px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="header">
Create Work Order
</div>

<div class="container">

<label>Select Asset</label>

<select id="assetList">
<option>Loading Asset...</option>
</select>

<label>Problem Description</label>

<textarea id="problem" rows="4" placeholder="Describe problem here"></textarea>

<button onclick="submitWO()">Submit Work Order</button>

</div>

<div class="footer">
CMMS | Powered by Google Sheets
</div>

<script>

const apiURL = "https://script.google.com/macros/s/AKfycbwPXX3CoMZWwP_oVI_LZS1sO_1jKvgvLYfbzP501SuS-BP7pDhHs8TTdt9hhcMcDYBXng/exec";

async function loadAssets(){

try{

let response = await fetch(apiURL);
let data = await response.json();

let dropdown = document.getElementById("assetList");

dropdown.innerHTML="";

data.forEach(asset => {

let option = document.createElement("option");

option.value = asset.assetID;
option.text = asset.assetID + " - " + asset.assetName;

dropdown.appendChild(option);

});

}catch(error){

document.getElementById("assetList").innerHTML="<option>Error loading asset</option>";

}

}

function submitWO(){

let asset = document.getElementById("assetList").value;
let problem = document.getElementById("problem").value;

if(problem==""){
alert("Please enter problem description");
return;
}

alert("Work Order Created\n\nAsset: "+asset+"\nProblem: "+problem);

}

loadAssets();

</script>

</body>
</html>
