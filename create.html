<script>

const apiURL =
"https://script.google.com/macros/s/AKfycbwPXX3CoMZWwP_oVI_LZS1sO_1jKvgvLYfbzP501SuS-BP7pDhHs8TTdt9hhcMcDYBXng/exec";

async function loadAssets(){

try{

const response = await fetch(apiURL,{
method:"GET",
mode:"cors"
});

const data = await response.json();

const dropdown = document.getElementById("assetList");

dropdown.innerHTML="";

data.forEach(asset => {

let option = document.createElement("option");

option.value = asset.assetID;
option.text = asset.assetID + " - " + asset.assetName;

dropdown.appendChild(option);

});

}catch(err){

console.error(err);

document.getElementById("assetList").innerHTML =
"<option>Cannot load asset</option>";

}

}

function submitWO(){

let asset = document.getElementById("assetList").value;
let problem = document.getElementById("problem").value;

alert("WO Created\n\nAsset: "+asset+"\nProblem: "+problem);

}

loadAssets();

</script>
