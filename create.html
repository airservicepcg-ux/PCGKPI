<script>

function loadAssets(data){

let dropdown = document.getElementById("assetList");

dropdown.innerHTML="";

data.forEach(a => {

let option = document.createElement("option");

option.value = a.assetID;
option.text = a.assetID + " - " + a.assetName;

dropdown.appendChild(option);

});

}

</script>

<script src="https://script.google.com/macros/s/AKfycbwPXX3CoMZWwP_oVI_LZS1sO_1jKvgvLYfbzP501SuS-BP7pDhHs8TTdt9hhcMcDYBXng/exec?callback=loadAssets"></script>
